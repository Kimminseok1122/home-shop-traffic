spring:
  application:
    name: home-shop-traffic
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/home_shop?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Seoul
    username: home_shop
    password: home_shop
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
  tomcat:
    threads:
      max: 80
    accept-count: 100

traffic:
  rate-limit:
    capacity: 20
    refill-per-second: 10.0
  waiting-room:
    token-ttl-seconds: 300
  order-queue:
    capacity: 1000
    workers: 4
    processor-delay-millis: 150

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  observations:
    key-values:
      application: home-shop-traffic
